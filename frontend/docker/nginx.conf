# Static SPA serving. Security headers and TLS belong to the host nginx in
# front of this; duplicating them here would only produce conflicting values.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log off;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vite emits content-hashed filenames, so assets are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, or a deploy leaves clients pinned to a
    # stale bundle referencing assets that no longer exist.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback: real files win, everything else renders the app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

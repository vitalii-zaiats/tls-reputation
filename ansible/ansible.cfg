[defaults]
inventory            = inventory/hosts.ini
roles_path           = roles
host_key_checking    = True
retry_files_enabled  = False
# The old community.general.yaml callback was removed in community.general 12;
# yaml-formatted results are now an option on the built-in default callback.
stdout_callback         = default
callback_result_format  = yaml
callbacks_enabled    = ansible.posix.profile_tasks
interpreter_python   = auto_silent
forks                = 10
display_skipped_hosts = False
# Facts are gathered a lot across three plays; cache them for the run.
fact_caching         = jsonfile
fact_caching_connection = .facts_cache
fact_caching_timeout = 3600

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=120s -o PreferredAuthentications=publickey
# synchronize/rsync benefits from the same multiplexed connection.
transfer_method = smart

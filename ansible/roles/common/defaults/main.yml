---
# Base packages installed on every host. Overridable per group. Short by
# design: these are container hosts and everything the applications need is
# inside their images.
tlsrep_common_packages:
  - ca-certificates
  - curl
  - unattended-upgrades
  - ufw
  - jq

tlsrep_timezone: Etc/UTC

tlsrep_deploy_user: deploy
tlsrep_deploy_group: deploy

# Public keys authorised for the deploy user. Populate in group_vars/all.yml
# with the contents of your laptop's ~/.ssh/id_ed25519.pub. Left empty here so
# the role never clobbers an existing authorized_keys on a bootstrapped host.
tlsrep_deploy_authorized_keys: []

# Automatic security updates. Reboots are NOT automatic -- the proxies hold
# long-lived connections and the app host should be rebooted deliberately.
tlsrep_unattended_reboot: false

# Whether this project owns the host firewall.
#
# true  — UFW is installed, default-deny inbound, and each role opens the
#         ports it needs. Correct for a dedicated host.
# false — UFW is not touched at all. Use this on a host that already runs
#         something else: a default-deny policy would silently cut off every
#         port this project does not know about.
tlsrep_manage_firewall: true

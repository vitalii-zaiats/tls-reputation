---
# --------------------------------------------------------------------------
# Backend: pull the prebuilt image from GHCR and run it.
#
# Nothing is compiled or installed here. The image is built for linux/amd64 on
# the laptop by the repo Makefile (`make push-backend`) and this role only ever
# pulls it. There is no source tree, no virtualenv and no service account on
# the host -- the image already runs as an unprivileged uid.
#
# There is also no separate migration step: the image applies schema.sql from
# its FastAPI lifespan hook on startup, so the schema is in place before the
# healthcheck can pass.
# --------------------------------------------------------------------------

- name: Assert an image tag is set
  ansible.builtin.assert:
    that:
      - tlsrep_image_tag | default('') | length > 0
    fail_msg: >-
      tlsrep_image_tag is empty. Pass one explicitly
      (-e tlsrep_image_tag=<git-sha>, which is what `make deploy` does) or
      leave the `latest` default in group_vars/all.yml in place.
    quiet: true
  run_once: true
  tags: [always]

# --------------------------------------------------------------------------
# The container.
#
# Redeploys work by image identity, not by tag string: docker_container
# compares the running container's image ID against the resolved image and
# recreates on a mismatch (image_name_mismatch defaults to `recreate`). That
# is why `pull` matters — for a moving tag like `latest` the image has to be
# re-resolved from the registry every run, or a redeploy would compare against
# the stale local copy and decide nothing changed. tlsrep_image_pull works
# that out from the tag; see group_vars/all.yml.
#
# `recreate: true` is deliberately NOT set: that would tear down and restart
# the container on every run whether or not anything changed.
# --------------------------------------------------------------------------

- name: Run the backend container
  community.docker.docker_container:
    name: "{{ tlsrep_backend_container_name }}"
    image: "{{ tlsrep_backend_image }}"
    pull: "{{ tlsrep_image_pull }}"

    # Waits for the image's HEALTHCHECK, so a deploy that starts but cannot
    # reach the database fails here instead of looking successful.
    state: healthy
    healthy_wait_timeout: "{{ tlsrep_backend_healthy_timeout }}"

    # dockerd is the systemd unit that owns container lifecycle; combined with
    # `docker.service` being enabled, this is what brings the API back after a
    # reboot or a crash.
    restart_policy: unless-stopped

    published_ports:
      - "{{ tlsrep_backend_bind_host }}:{{ tlsrep_backend_bind_port }}:{{ tlsrep_backend_container_port }}"

    # PostgreSQL runs on the host, so 127.0.0.1 inside the container is the
    # wrong machine. host-gateway resolves to the docker0 address, which the
    # postgres role has opened listen_addresses and pg_hba.conf for.
    etc_hosts:
      host.docker.internal: host-gateway

    env: "{{ _tlsrep_backend_env | combine(tlsrep_backend_extra_env) }}"

    # --- hardening ------------------------------------------------------
    # The application writes nothing to disk: its state is in PostgreSQL and
    # its logs go to stdout. /tmp is tmpfs only because the stdlib expects a
    # writable one to exist.
    read_only: true
    tmpfs:
      - "/tmp:rw,noexec,nosuid,size=64m"
    cap_drop: [ALL]
    security_opts:
      - "no-new-privileges:true"

    # --- resource limits ------------------------------------------------
    memory: "{{ tlsrep_backend_memory_max }}"
    # Equal to `memory` disables swap: an OOM should kill and restart the
    # container, not degrade the whole host into swapping.
    memory_swap: "{{ tlsrep_backend_memory_max }}"
    pids_limit: "{{ tlsrep_backend_pids_limit }}"
    ulimits:
      - "nofile:{{ tlsrep_backend_nofile_limit }}:{{ tlsrep_backend_nofile_limit }}"

    log_driver: json-file
    log_options:
      max-size: "{{ tlsrep_docker_log_max_size | default('10m') }}"
      max-file: "{{ tlsrep_docker_log_max_file | default(3) | string }}"

    labels:
      com.tls-reputation.component: backend
      com.tls-reputation.tag: "{{ tlsrep_image_tag }}"

    # Give the app time to flush in-flight requests.
    stop_timeout: 30
  vars:
    _tlsrep_backend_env:
      TLSREP_DSN: "{{ tlsrep_dsn }}"
      TLSREP_INGEST_KEY: "{{ tlsrep_ingest_key }}"
      TLSREP_CORS_ORIGINS: "{{ tlsrep_cors_origins }}"
  # The DSN carries the database password and the env dict carries the ingest
  # key, both of which would otherwise be printed verbatim in the task result.
  # The cost is that a failure here reports nothing useful -- see the README
  # for how to debug it (`docker logs tlsrep-backend`).
  no_log: true
  tags: [deploy]

---
tlsrep_pg_version: 16
tlsrep_pg_conf_dir: "/etc/postgresql/{{ tlsrep_pg_version }}/main"

# Loopback plus the Docker bridge gateway. Nothing outside this host ever
# speaks to the database -- but the API is now a container, and from inside a
# container 127.0.0.1 is the container itself, so it reaches PostgreSQL across
# docker0 instead. The bridge subnet is pinned by the `docker` role precisely
# so this address and the pg_hba entry below can name it.
#
# This is the only concession the database makes to containerisation. It is
# still not on any routable interface, and pg_hba only trusts the bridge.
tlsrep_docker_bridge_ip: "172.17.0.1"
tlsrep_docker_bridge_subnet: "172.17.0.0/16"

tlsrep_pg_listen_addresses: "127.0.0.1,{{ tlsrep_docker_bridge_ip }}"
tlsrep_pg_port: 5432

# Modest tuning for a small VPS. Adjust to the box.
tlsrep_pg_max_connections: 100
tlsrep_pg_shared_buffers: 256MB
tlsrep_pg_effective_cache_size: 768MB
tlsrep_pg_work_mem: 8MB
tlsrep_pg_maintenance_work_mem: 64MB

# Log statements slower than this (ms); -1 disables.
tlsrep_pg_log_min_duration: 500

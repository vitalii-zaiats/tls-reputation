---
# --------------------------------------------------------------------------
# Docker Engine from the upstream apt repository.
#
# Everything this project deploys is a prebuilt image pulled from GHCR, so
# this role is a prerequisite of backend, frontend and proxy alike. Nothing is
# ever built here — `docker buildx` runs on the laptop, driven by the repo's
# Makefile.
# --------------------------------------------------------------------------

- name: Map the kernel architecture to a Debian one
  ansible.builtin.set_fact:
    _tlsrep_deb_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_facts['architecture']] }}"
  tags: [always]

# deb822_repository parses and emits .sources files with python3-debian, which
# noble does not install by default.
- name: Install the apt repository prerequisites
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: [setup]

- name: Create the apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [setup]

- name: Install the Docker apt signing key
  ansible.builtin.get_url:
    url: "{{ tlsrep_docker_apt_key_url }}"
    dest: "{{ tlsrep_docker_apt_key_path }}"
    owner: root
    group: root
    # 0644, not 0600: apt drops privileges to _apt before reading it.
    mode: "0644"
  tags: [setup]

- name: Add the Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "{{ tlsrep_docker_apt_repo_url }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: [stable]
    architectures: "{{ _tlsrep_deb_arch }}"
    # Scoping the key to this one repository is the point: a key in
    # trusted.gpg.d would be trusted to sign packages for every other
    # repository on the host as well.
    signed_by: "{{ tlsrep_docker_apt_key_path }}"
    enabled: true
    state: present
  register: _tlsrep_docker_repo
  tags: [setup]

- name: Install Docker Engine
  ansible.builtin.apt:
    name: "{{ tlsrep_docker_packages + tlsrep_docker_python_packages }}"
    state: present
    update_cache: "{{ _tlsrep_docker_repo is changed }}"
  tags: [setup]

# --------------------------------------------------------------------------
# Daemon configuration. Log rotation is the important part: json-file has no
# rotation by default and these containers run indefinitely.
# --------------------------------------------------------------------------

- name: Configure the Docker daemon
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    # A malformed daemon.json makes dockerd refuse to start, which on a host
    # whose entire workload is containers is a total outage. Parse it here.
    validate: "python3 -c \"import json,sys; json.load(open(sys.argv[1]))\" %s"
  notify: Restart docker
  tags: [setup, config]

- name: Ensure Docker is enabled and running
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started
  tags: [setup]

# The daemon has to be running with the final bridge configuration before any
# container task tries to publish a port on it.
- name: Apply the pending Docker restart
  ansible.builtin.meta: flush_handlers
  tags: [setup, config]

- name: Add accounts to the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ tlsrep_docker_users }}"
  when: tlsrep_docker_users | length > 0
  tags: [setup]

# --------------------------------------------------------------------------
# Registry authentication.
#
# Conditional on a token being resolved, so the role keeps working if the
# packages are ever made public — but in practice a token is needed. GHCR
# publishes every new package as private regardless of the repository's
# visibility, so unless all three have been explicitly flipped to public, an
# anonymous pull returns "denied" — which names neither the package nor
# authentication, and is a confusing way to find this out.
#
# See group_vars/all/main.yml for how the token is resolved.
# --------------------------------------------------------------------------

- name: Authenticate to the container registry
  community.docker.docker_login:
    registry_url: "{{ tlsrep_docker_registry }}"
    username: "{{ tlsrep_ghcr_username }}"
    password: "{{ tlsrep_ghcr_token }}"
    reauthorize: false
    state: present
  when:
    - tlsrep_ghcr_token | default('') | length > 0
    - tlsrep_ghcr_username | default('') | length > 0
  # The token would otherwise be echoed in the task arguments.
  no_log: true
  tags: [setup, deploy]

- name: Warn that no registry credentials were supplied
  ansible.builtin.debug:
    msg: >-
      No registry token found, so no docker login was performed. The
      {{ tlsrep_docker_registry }} packages are currently PRIVATE, so the
      image pull below will fail with "denied" unless you have since made
      them public. Supply a GitHub PAT with read:packages via
      GHCR_TOKEN=... in the environment (preferred), -e tlsrep_ghcr_token=...,
      or vault_ghcr_token in a vault. See ansible/README.md.
  when: tlsrep_ghcr_token | default('') | length == 0
  tags: [setup, deploy]

# --------------------------------------------------------------------------
# Housekeeping. A moving `latest` orphans the previous image on every deploy;
# without pruning the disk fills up silently over months.
# --------------------------------------------------------------------------

- name: Schedule a weekly image prune
  ansible.builtin.cron:
    name: tlsrep-docker-prune
    # -a would also remove images that are tagged but not running, which is
    # what makes rollback to a previous tag instant. `until` keeps a window of
    # them; only dangling layers older than that actually go.
    job: >-
      /usr/bin/docker image prune --force --filter until={{ tlsrep_docker_prune_until }}
      >/dev/null 2>&1
    weekday: "{{ tlsrep_docker_prune_weekday | string }}"
    hour: "{{ tlsrep_docker_prune_hour | string }}"
    minute: "17"
    user: root
    cron_file: tlsrep-docker-prune
    state: "{{ 'present' if tlsrep_docker_prune_enabled else 'absent' }}"
  tags: [setup, config]

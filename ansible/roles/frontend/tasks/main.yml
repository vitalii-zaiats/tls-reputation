---
# --------------------------------------------------------------------------
# Frontend: pull the prebuilt SPA image from GHCR and run it.
#
# No Node, no npm, no build step and no web root on the host. The image is
# nginx with the Vite output baked in, built on the laptop by
# `make push-frontend`. VITE_API_BASE is therefore fixed at *image build* time,
# not at deploy time -- changing it means a rebuild, not a re-run of this role.
#
# The container's nginx serves static files and nothing else. TLS, the security
# headers, rate limiting and the /api/ + /internal/ proxying belong to the host
# nginx configured by the `nginx` role.
# --------------------------------------------------------------------------

- name: Assert an image tag is set
  ansible.builtin.assert:
    that:
      - tlsrep_image_tag | default('') | length > 0
    fail_msg: >-
      tlsrep_image_tag is empty. Pass one explicitly
      (-e tlsrep_image_tag=<git-sha>, which is what `make deploy` does) or
      leave the `latest` default in group_vars/all.yml in place.
    quiet: true
  run_once: true
  tags: [always]

- name: Run the frontend container
  community.docker.docker_container:
    name: "{{ tlsrep_frontend_container_name }}"
    image: "{{ tlsrep_frontend_image }}"
    # See roles/backend/tasks/main.yml for why this is computed from the tag.
    pull: "{{ tlsrep_image_pull }}"

    state: healthy
    healthy_wait_timeout: "{{ tlsrep_frontend_healthy_timeout }}"

    restart_policy: unless-stopped

    published_ports:
      - "{{ tlsrep_frontend_bind_host }}:{{ tlsrep_frontend_bind_port }}:{{ tlsrep_frontend_container_port }}"

    # --- hardening ------------------------------------------------------
    # nginx needs somewhere for its pid file and its proxy/fastcgi scratch
    # directories, both of which a read-only rootfs would reject. tmpfs gives
    # it exactly those and nothing else -- the served bundle stays on the
    # read-only image layer where nothing can rewrite it.
    read_only: true
    tmpfs:
      - "/var/cache/nginx:rw,nosuid,size=32m"
      - "/var/run:rw,noexec,nosuid,size=4m"
      - "/tmp:rw,noexec,nosuid,size=16m"
    # The master process binds port 80 inside its own network namespace
    # (NET_BIND_SERVICE) and drops workers to the `nginx` user (SETUID/SETGID,
    # and CHOWN for the tmpfs cache dirs). Everything else goes.
    cap_drop: [ALL]
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
    security_opts:
      - "no-new-privileges:true"

    # --- resource limits ------------------------------------------------
    memory: "{{ tlsrep_frontend_memory_max }}"
    memory_swap: "{{ tlsrep_frontend_memory_max }}"
    pids_limit: "{{ tlsrep_frontend_pids_limit }}"

    log_driver: json-file
    log_options:
      max-size: "{{ tlsrep_docker_log_max_size | default('10m') }}"
      max-file: "{{ tlsrep_docker_log_max_file | default(3) | string }}"

    labels:
      com.tls-reputation.component: frontend
      com.tls-reputation.tag: "{{ tlsrep_image_tag }}"

    stop_timeout: 10
  tags: [deploy]

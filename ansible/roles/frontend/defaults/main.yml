---
tlsrep_frontend_container_name: tlsrep-frontend

tlsrep_frontend_image_repo: "{{ tlsrep_image_base }}-frontend"
tlsrep_frontend_image: "{{ tlsrep_frontend_image_repo }}:{{ tlsrep_image_tag }}"

# Published on loopback only. The host nginx terminates TLS and proxies / here;
# nothing reaches this container from outside the box.
tlsrep_frontend_bind_host: 127.0.0.1
tlsrep_frontend_bind_port: 8080
# nginx's port inside the image; fixed by the Dockerfile.
tlsrep_frontend_container_port: 80

tlsrep_frontend_memory_max: 256M
tlsrep_frontend_pids_limit: 128

tlsrep_frontend_healthy_timeout: 60

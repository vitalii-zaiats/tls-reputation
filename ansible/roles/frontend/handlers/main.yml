---
# Static files need no service restart, but nginx should re-stat its caches
# after a deploy. Reload is graceful -- no dropped connections.
- name: Reload nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: reloaded
  # Only meaningful once the nginx role has installed the unit; on a first run
  # where the frontend play beats nginx, skip rather than fail.
  when: not ansible_check_mode
  failed_when: false

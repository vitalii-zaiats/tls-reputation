---
# Same uv bootstrap as the backend role. Duplicated rather than shared so the
# proxy role stays independently runnable on hosts that have no backend.

- name: Determine the uv release architecture
  ansible.builtin.set_fact:
    _tlsrep_uv_arch: >-
      {{ {'x86_64': 'x86_64', 'aarch64': 'aarch64'}[ansible_facts['architecture']] }}
  tags: [setup]

- name: Check the installed uv version
  ansible.builtin.command:
    cmd: /usr/local/bin/uv --version
  register: _tlsrep_uv_installed
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [setup]

- name: Install uv
  ansible.builtin.unarchive:
    src: >-
      https://github.com/astral-sh/uv/releases/download/{{ tlsrep_uv_version }}/uv-{{ _tlsrep_uv_arch }}-unknown-linux-gnu.tar.gz
    dest: /usr/local/bin
    remote_src: true
    extra_opts:
      - --strip-components=1
    owner: root
    group: root
    mode: "0755"
  when: tlsrep_uv_version not in (_tlsrep_uv_installed.stdout | default(''))
  tags: [setup]

- name: Install the pinned Python runtime
  ansible.builtin.command:
    cmd: /usr/local/bin/uv python install {{ tlsrep_python_version }}
  environment:
    UV_PYTHON_INSTALL_DIR: /opt/uv-python
  register: _tlsrep_uv_python
  changed_when: "'Installed' in (_tlsrep_uv_python.stderr | default(''))"
  tags: [setup]

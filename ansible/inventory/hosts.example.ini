; Copy to inventory/hosts.ini and edit. hosts.ini is gitignored.
;
;   cp inventory/hosts.example.ini inventory/hosts.ini
;
; The backend and frontend normally share one host (the frontend is just static
; files served by the same nginx vhost that proxies /api/ to the backend).
; The proxy collectors live on separate residential exit nodes.

[tlsrep_backend]
app1.tls-reputation.com ansible_host=203.0.113.10

[tlsrep_frontend]
app1.tls-reputation.com ansible_host=203.0.113.10

; Each exit node gets its own listen port so they are easy to tell apart
; in the ingest logs. Override any group var per host here.
[tlsrep_proxy]
exit1.tls-reputation.com ansible_host=203.0.113.21 tlsrep_proxy_listen_port=18443
exit2.tls-reputation.com ansible_host=203.0.113.22 tlsrep_proxy_listen_port=18444

[all:vars]
ansible_user=deploy
ansible_python_interpreter=/usr/bin/python3

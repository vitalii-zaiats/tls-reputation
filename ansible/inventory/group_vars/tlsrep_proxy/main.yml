---
# ---------------------------------------------------------------------------
# Collector proxy configuration.
# Secret (vault_tlsrep_ingest_key) comes from group_vars/tlsrep_proxy/vault.yml
# and MUST match the value deployed to the backend.
# ---------------------------------------------------------------------------

# High, non-standard port on the host. Overridden per host in the inventory so
# each exit node is distinguishable in the ingest logs. Deliberately NOT 80/443
# -- these boxes must not look like, or be reachable as, web servers.
#
# This is the one container in the project published on 0.0.0.0 rather than
# loopback: remote clients dial the collector directly, there is no host nginx
# in front of it.
tlsrep_proxy_port: 18443
tlsrep_proxy_bind_address: "0.0.0.0"

# Where collected ClientHellos are shipped. This is the internal ingest
# endpoint, authenticated with the shared ingest key.
tlsrep_proxy_ingest_url: "https://{{ tlsrep_domain }}/internal/v1/ingest"
tlsrep_ingest_key: "{{ vault_tlsrep_ingest_key }}"

# Batching: flush when either bound is hit.
tlsrep_proxy_batch_size: 200
tlsrep_proxy_flush_interval: 15

# Container resource limits. The proxy is I/O bound and holds many sockets, so
# the file descriptor limit is the binding constraint, not memory.
tlsrep_proxy_memory_max: 512M
tlsrep_proxy_pids_limit: 4096
tlsrep_proxy_nofile_limit: 65535

# Extra CIDRs allowed to reach the proxy port.
#
# READ THIS BEFORE RELYING ON IT: Docker's published ports are DNAT'd in the
# DOCKER-USER chain, which is traversed *before* UFW's chains. UFW rules
# therefore do not filter traffic to a published container port. The rules
# below are still applied (they document intent and they do govern anything
# listening on the host itself), but source restriction for the collector port
# has to be enforced at the cloud provider's firewall / security group.
tlsrep_proxy_allowed_sources: []

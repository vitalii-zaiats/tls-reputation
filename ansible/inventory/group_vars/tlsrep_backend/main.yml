---
# ---------------------------------------------------------------------------
# Backend + database configuration.
# Secrets (vault_tlsrep_db_password, vault_tlsrep_ingest_key) come from
# group_vars/tlsrep_backend/vault.yml — see vault.yml.example.
# ---------------------------------------------------------------------------

tlsrep_backend_user: tlsrep
tlsrep_backend_group: tlsrep
tlsrep_backend_dir: "{{ tlsrep_install_root }}/backend"
tlsrep_backend_venv: "{{ tlsrep_backend_dir }}/.venv"
tlsrep_backend_env_file: "{{ tlsrep_config_dir }}/backend.env"

# uvicorn binds loopback only; nginx is the only thing that talks to it.
tlsrep_backend_bind_host: 127.0.0.1
tlsrep_backend_bind_port: 8000
tlsrep_backend_workers: 2

# Database. The postgres role creates the role + database with these values.
tlsrep_db_name: tlsrep
tlsrep_db_user: tlsrep
tlsrep_db_host: 127.0.0.1
tlsrep_db_port: 5432
tlsrep_db_password: "{{ vault_tlsrep_db_password }}"

# `urlencode` deliberately leaves "/" alone (it is path-safe), but a "/" in the
# password would still be ambiguous inside a DSN, so escape it explicitly.
# Passwords generated with secrets.token_urlsafe() need none of this; it only
# matters if you pick your own.
tlsrep_dsn: >-
  postgresql://{{ tlsrep_db_user }}:{{ tlsrep_db_password | urlencode | replace('/', '%2F') }}@{{ tlsrep_db_host }}:{{ tlsrep_db_port }}/{{ tlsrep_db_name }}

# Shared secret the proxies present on the internal ingest endpoint.
tlsrep_ingest_key: "{{ vault_tlsrep_ingest_key }}"

# Browsers hitting the public site. The SPA is same-origin so this is mostly
# belt-and-braces, but the API is meant to be usable from other origins too.
tlsrep_cors_origins: "https://{{ tlsrep_domain }},https://www.{{ tlsrep_domain }}"

# systemd resource limits for the API.
tlsrep_backend_memory_max: 1G
tlsrep_backend_tasks_max: 512

# Relative to the repo root; applied on every deploy before the restart.
tlsrep_backend_schema_file: backend/tlsrep/schema.sql
